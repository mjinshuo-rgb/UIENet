# ============================================================
# UIENet 配置文件 (v4.0 — 28dB+ 终极版)
# ============================================================

# ---- 基本设置 ----
in_channels: 3
num_classes: 3
device: "cuda"

# ---- Phase 1: 深度物理先验 ----
phase1_feat_channels: 128
phase1_retinex_mid_channels: 48
phase1_density_mid_channels: 64

# ---- Phase 2: 多域特征协同 ----
branch_swin:
  embed_dim: 128
  window_size: 8
  num_heads: 4
  num_layers: 6
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0

branch_freq:
  mid_channels: 128
  input_size: [384, 384]

branch_cbam:
  reduction: 16
  spatial_kernel: 7

branch_unet:
  base_channels: 128
  input_size: [384, 384]

# ---- Phase 3: 融合 + LAB ----
phase3:
  dim: 128
  num_heads: 4
  patch_size: 8
  lab_correction: true

# ---- 判别器 ----
discriminator:
  ndf: 64
  n_layers: 3
  r1_gamma: 1.0              # R1 梯度惩罚系数（稳定 GAN 训练）

# ---- 数据 ----
data:
  train_dirs:
    - "./datasets/EUVP/train"
    - "./datasets/UIEB/train_filtered"
    - "./datasets/LSUI/test"        # v4.0: LSUI 加入训练，提升泛化
  test_dirs:
    euvp: "./datasets/EUVP/test"
    lsui: "./datasets/LSUI/test"
    u90:  "./datasets/U90"
  train_size: [384, 384]
  normalize_mean: [0.5, 0.5, 0.5]
  normalize_std:  [0.5, 0.5, 0.5]
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.3
  color_jitter:                    # v4.0: 强增强提升 U90 泛化
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1

# ---- 训练超参数 ----
training:
  batch_size: 2
  gradient_accumulation: 4           # 等效 batch_size = 8
  num_epochs: 100
  learning_rate: 2.0e-4              # 生成器学习率
  d_learning_rate: 1.0e-4            # 判别器学习率
  weight_decay: 1.0e-4
  betas: [0.5, 0.999]               # Adam betas（GAN 常用 0.5）
  scheduler: CosineAnnealingLR
  T_max: 100
  eta_min: 1.0e-7
  warmup_epochs: 10
  warmup_start_lr: 1.0e-6
  gan_start_epoch: 5                # 第 N 个 epoch 后启用 GAN 损失
  d_update_freq: 1                   # 每 N 步更新判别器
  ema_decay: 0.999                   # EMA 衰减率

# ---- 损失函数权重 ----
loss:
  lambda_l1: 1.0
  lambda_ssim: 1.0
  lambda_vgg: 0.5
  lambda_lab: 1.0
  lambda_gan: 0.3                    # 对抗损失权重（v4.0 提升）
  lambda_gradient: 0.5               # 梯度损失（边缘锐度）
  lambda_frequency: 0.1              # 频域损失（纹理匹配）
  lambda_retinex: 0.05
  lambda_d_mid: 0.5
  lambda_b_mid: 0.3

# ---- 日志与检查点 ----
logging:
  save_every: 10
  val_every: 5
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"