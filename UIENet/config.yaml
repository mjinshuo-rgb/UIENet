# ============================================================
# UIENet 配置文件 (v2.0)
# 所有超参数集中管理，代码通过 omegaconf 点号访问
# ============================================================

# ---- 基本设置 ----
in_channels: 3
num_classes: 3  # 输出通道数（RGB）

# ---- Phase 1: 物理感知与预处理 ----
phase1_feat_channels: 96
phase1_retinex_mid_channels: 32
phase1_density_mid_channels: 64

# ---- Phase 2: 多域特征协同提取 ----
# 分支 A: Swin Transformer
branch_swin:
  embed_dim: 96           # 与 phase1 输出通道一致
  window_size: 8
  num_heads: 6
  num_layers: 4           # v2.0 升级为 4 层
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0

# 分支 B: 频域解耦
branch_freq:
  mid_channels: 96
  # 中间监督头输入尺寸（用于上采样到原图）
  input_size: [384, 384]

# 分支 C: CBAM 空域-注意力
branch_cbam:
  reduction: 16           # 通道注意力 MLP 降维比
  spatial_kernel: 7      # 空间注意力卷积核

# 分支 D: 轻量 U-Net
branch_unet:
  base_channels: 96
  # 中间监督头输入尺寸
  input_size: [384, 384]

# ---- Phase 3: 智能融合与重构 ----
phase3:
  dim: 96
  num_heads: 6
  patch_size: 8          # Patch-based Cross-Attention（显存安全）
  lab_correction: true

# ---- 数据预处理 ----
data:
  train_dirs:
    - "./datasets/EUVP/train"
    - "./datasets/UIEB/train_filtered"
  test_dirs:
    euvp: "./datasets/EUVP/test"
    lsui: "./datasets/LSUI/test"
    u90:  "./datasets/U90"
  train_size: [384, 384]   # 训练分辨率 v2.0
  normalize_mean: [0.5, 0.5, 0.5]
  normalize_std:  [0.5, 0.5, 0.5]
  random_crop: true
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.5
  color_jitter:
    brightness: 0.1
    contrast: 0.1
    saturation: 0.1
    hue: 0.05

# ---- 训练超参数 ----
training:
  batch_size: 4
  gradient_accumulation: 2
  num_epochs: 2
  learning_rate: 2.0e-4
  weight_decay: 1.0e-4
  betas: [0.9, 0.999]
  scheduler: CosineAnnealingLR
  T_max: 200
  eta_min: 1.0e-6
  warmup_epochs: 10
  warmup_start_lr: 1.0e-6

# ---- 损失函数权重 ----
loss:
  lambda_l1: 1.0
  lambda_ssim: 0.5
  lambda_vgg: 0.1
  lambda_lab: 1.0
  lambda_retinex: 0.05
  lambda_d_mid: 0.3
  lambda_b_mid: 0.2

# ---- 日志与检查点 ----
logging:
  save_every: 1
  val_every: 5
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"

# ---- 硬件 ----
device: "cuda"