# ============================================================
# UIENet 配置文件 (v3.0 — 28dB+ 升级版)
# 所有超参数集中管理，代码通过 omegaconf 点号访问
# ============================================================

# ---- 基本设置 ----
in_channels: 3
num_classes: 3  # 输出通道数（RGB）
device: "cuda"

# ---- Phase 1: 物理感知与预处理 ----
phase1_feat_channels: 128
phase1_retinex_mid_channels: 64
phase1_density_mid_channels: 128

# ---- Phase 2: 多域特征协同提取 ----
# 分支 A: Swin Transformer
branch_swin:
  embed_dim: 128
  window_size: 8
  num_heads: 8
  num_layers: 6
  mlp_ratio: 4.0
  drop_rate: 0.0
  attn_drop_rate: 0.0

# 分支 B: 频域解耦
branch_freq:
  mid_channels: 128
  input_size: [384, 384]

# 分支 C: CBAM 空域-注意力
branch_cbam:
  reduction: 16
  spatial_kernel: 7

# 分支 D: 轻量 U-Net
branch_unet:
  base_channels: 128
  input_size: [384, 384]

# ---- Phase 3: 智能融合与重构 ----
phase3:
  dim: 128
  num_heads: 8
  patch_size: 8
  lab_correction: true

# ---- 判别器 (PatchGAN) ----
discriminator:
  ndf: 64
  n_layers: 3
  use_multi_scale: false  # 多尺度判别器（batch<8 不建议开启，易 OOM）

# ---- 数据预处理 ----
data:
  train_dirs:
    - "./datasets/EUVP/train"
    - "./datasets/UIEB/train_filtered"
  test_dirs:
    euvp: "./datasets/EUVP/test"
    lsui: "./datasets/LSUI/test"
    u90:  "./datasets/U90"
  train_size: [384, 384]
  normalize_mean: [0.5, 0.5, 0.5]
  normalize_std:  [0.5, 0.5, 0.5]
  random_crop: true
  horizontal_flip_prob: 0.5
  vertical_flip_prob: 0.5
  color_jitter:
    brightness: 0.15
    contrast: 0.15
    saturation: 0.15
    hue: 0.1

# ---- 训练超参数 ----
training:
  batch_size: 1
  gradient_accumulation: 8           # 等效 batch_size = 8
  num_epochs: 100
  learning_rate: 2.0e-4              # 生成器学习率
  d_learning_rate: 1.0e-4            # 判别器学习率
  weight_decay: 1.0e-4
  betas: [0.5, 0.999]               # Adam betas（GAN 常用 0.5）
  scheduler: CosineAnnealingLR
  T_max: 100
  eta_min: 1.0e-7
  warmup_epochs: 10
  warmup_start_lr: 1.0e-6
  gan_start_epoch: 5                # 第 N 个 epoch 后启用 GAN 损失
  d_update_freq: 1                   # 每 N 步更新判别器
  ema_decay: 0.999                   # EMA 衰减率

# ---- 损失函数权重 ----
loss:
  lambda_l1: 1.0
  lambda_ssim: 1.0
  lambda_vgg: 0.5
  lambda_lab: 1.0
  lambda_gan: 0.1                    # 对抗损失权重
  lambda_gradient: 0.5               # 梯度损失（边缘锐度）
  lambda_frequency: 0.1              # 频域损失（纹理匹配）
  lambda_retinex: 0.05
  lambda_d_mid: 0.5
  lambda_b_mid: 0.3

# ---- 日志与检查点 ----
logging:
  save_every: 10
  val_every: 5
  log_dir: "./logs"
  checkpoint_dir: "./checkpoints"